<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWing - My Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/my-bookings.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-icon.css">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <i class="fas fa-plane-departure me-2"></i>
                SkyWing
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="fas fa-home me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="flight-home.html">
                            <i class="fas fa-search me-1"></i> Search Flights
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            <i class="fas fa-ticket-alt me-1"></i> My Bookings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="deals.html">
                            <i class="fas fa-tags me-1"></i> Deals
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="help-support.html">
                            <i class="fas fa-question-circle me-1"></i> Help & Support
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="user-name me-3" id="userName"></span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-ticket-alt me-2"></i>My Bookings</h1>
                <p class="text-muted">View and manage your flight bookings</p>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading your bookings...</p>
            </div>

            <!-- No Bookings Message -->
            <div id="noBookings" class="no-bookings-container" style="display: none;">
                <div class="no-bookings-icon">
                    <i class="fas fa-plane-slash"></i>
                </div>
                <h3>No Bookings Found</h3>
                <p class="text-muted">You haven't made any flight bookings yet.</p>
                <a href="flight-home.html" class="btn btn-primary">
                    <i class="fas fa-search me-2"></i>Search Flights
                </a>
            </div>

            <!-- Bookings List -->
            <div id="bookingsList" class="bookings-list">
                <!-- Booking cards will be dynamically inserted here -->
            </div>

            <!-- Total Bookings Summary -->
            <div id="totalBookingsCard" class="total-bookings-card" style="display: none;">
                <div class="total-content">
                    <div class="total-item">
                        <span class="total-label">Total Bookings</span>
                        <span class="total-value" id="totalBookingsCount">0</span>
                    </div>
                    <div class="total-divider"></div>
                    <div class="total-item">
                        <span class="total-label">Total Amount Spent</span>
                        <span class="total-value" id="totalSpent">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/my-bookings.js"></script>
    <script src="js/admin-icon.js"></script>
</body>

</html>
