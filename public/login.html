<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - My Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Sign In</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <p>Don't have an account? <a href="index.html">Register here</a></p>
    
    <div class="divider"><span>ADMIN</span></div>
    
    <p style="text-align: center;">
        <a href="admin-register.html" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; text-decoration: none; font-weight: 500;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            Admin Access
        </a>
    </p>
</div>

<script src="js/auth.js"></script>

</body>
</html>
