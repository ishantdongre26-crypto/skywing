<!DOCTYPE html>
<html lang="en">
<head>
    <title>Help & Support - SkyWing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <i class="fas fa-plane-departure me-2"></i>
                SkyWing
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="fas fa-home me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="flight-home.html">
                            <i class="fas fa-search me-1"></i> Search Flights
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my-bookings.html">
                            <i class="fas fa-ticket-alt me-1"></i> My Bookings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="deals.html">
                            <i class="fas fa-tags me-1"></i> Deals
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="help-support.html">
                            <i class="fas fa-question-circle me-1"></i> Help & Support
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="user-name me-3" id="displayUserName"></span>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <section class="page-header">
            <h1><i class="fas fa-headset me-3"></i>Help & Support</h1>
            <p>Get instant answers to your questions about SkyWing</p>
        </section>

        <!-- Chatbot Container -->
        <div class="chatbot-container">
            <!-- Quick Topics Sidebar -->
            <div class="quick-topics">
                <h3><i class="fas fa-lightbulb me-2"></i>Quick Topics</h3>
                <div id="quickTopics">
                    <!-- Topics will be populated by JavaScript -->
                </div>
            </div>

            <!-- Chat Window -->
            <div class="chat-window">
                <div class="chat-header">
                    <div class="chatbot-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="chat-header-info">
                        <h4>SkyWing Assistant</h4>
                        <p><span class="status-dot"></span> Online - Ready to help!</p>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <!-- Chat messages will appear here -->
                </div>

                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Type your question here...">
                    <button class="send-btn" onclick="handleSend()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chatbot JavaScript -->
    <script src="js/chatbot.js"></script>
</body>
</html>
